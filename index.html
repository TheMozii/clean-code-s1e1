<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="todo-header">
    <div class="todo-header__info">
      <img src="./eisenhower-matrix.jpg" alt="Eisenhower Matrix">
      <a class="todo-header__more-info" href="https://goal-life.com/page/method/matrix-eisenhower" target="_blank" rel="noopener noreferrer">
        Want more details?
      </a>
    </div>
  </header>
  <main class="todo-main">
    <section class="todo-add-item">
      <label class="todo-add-item__label" for="new-task">Add Item</label>
      <div class="todo-add-item__input-wrapper">
        <input id="new-task" class="todo-add-item__input" type="text" placeholder="Enter a task">
        <button class="todo-add-item__button">Add</button>
      </div>
    </section>
    <section class="todo-list">
      <h3 class="todo-list__heading">Todo</h3>
      <ul id="incompleteTasks" class="todo-list__items">
        <li class="todo-list__item">
          <input type="checkbox" class="todo-list__checkbox">
          <label class="todo-list__task">Pay Bills</label>
          <input type="text" class="todo-list__edit-input" placeholder="Edit your task">
          <button class="todo-list__edit-button">Edit</button>
          <button class="todo-list__delete-button">
            <img src="./remove.svg" alt="Remove task">
          </button>
        </li>
        <li class="todo-list__item todo-list__item--edit-mode">
         <input type="checkbox" class="todo-list__checkbox">
         <label class="todo-list__task">Go Shopping</label>
         <input type="text" value="Go Shopping" class="todo-list__edit-input" placeholder="Edit your task">
         <button class="todo-list__edit-button">Save</button> 
         <button class="todo-list__delete-button">
             <img src="./remove.svg" alt="Remove task">
         </button>
     </li>     
      </ul>
      <h3 class="todo-list__heading">Completed</h3>
      <ul id="completed-tasks" class="todo-list__items">
        <li class="todo-list__item">
          <input type="checkbox" class="todo-list__checkbox" checked>
          <label class="todo-list__task">See the Doctor</label>
          <input type="text" class="todo-list__edit-input" placeholder="Edit your task">
          <button class="todo-list__edit-button">Edit</button>
          <button class="todo-list__delete-button">
            <img src="./remove.svg" alt="Remove task">
          </button>
        </li>
      </ul>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
